# Free hourly trigger — uses GitHub Actions schedule (no Render Cron fee).
#
# Setup:
# 1. In Render: add env CRON_SECRET (long random string).
# 2. In GitHub repo → Settings → Secrets and variables → Actions, add:
#    - CRON_SECRET (same value as Render)
#    - RENDER_CRON_URL = https://YOUR-SERVICE.onrender.com/api/cron/hourly
# 3. Push this file to your default branch.
#
# Schedule is UTC. Edit the cron expression if you want a different hour.

name: Hourly job pipeline

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger hourly cycle on Render
        env:
          URL: ${{ secrets.RENDER_CRON_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "Set RENDER_CRON_URL and CRON_SECRET in GitHub Actions secrets."
            exit 1
          fi
          curl -fsS --max-time 120 -X POST "$URL" \
            -H "Authorization: Bearer $SECRET" \
            -H "Content-Type: application/json" \
            -d '{}'
